<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paw Paradise</title>
  <link rel="icon" type="image/png" href="/images/favicon for catshop.png" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <header class="header">
    <h1 id="pageTitle"></h1>
    <nav class="nav" id="nav"></nav>
  </header>

  <main id="mainContent" class="main shop"></main>

  <aside class="cart-panel" aria-label="Shopping cart">
    <div class="cart-header">
      <h2>Shopping Cart</h2>
    </div>
    <div class="cart-columns">
      <span>Product</span>
      <span>Quantity</span>
      <span>Total</span>
    </div>
    <div id="cartItems" class="order-items"></div>
    <div class="cart-footer">
      <span>Grand Total</span>
      <span id="cartTotal">฿0.00</span>
    </div>
  </aside>

  <!--header-->
  <script src="/controller/js/header.js"></script>
  <!--shop-->
  <script src="/controller/js/shop.js"></script>
  <!--cart-->
  <script src="/controller/js/cart.js"></script>
</body>

</html>
