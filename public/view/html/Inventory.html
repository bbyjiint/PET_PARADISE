<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paw Paradise</title>
    <link rel="icon" type="image/png" href="/images/favicon for catshop.png" />
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="header">
      <h1 id="pageTitle"></h1>
      <nav class="nav" id="nav"></nav>
      <!-- <button class="cart-btn" id="cartBtn" type="button">
        <i class="fa-solid fa-cart-arrow-down cart-icon"></i>
        <span id="cartCount">0</span> -->
      
    </header>

    <main class="inventory">
      <h2 id="Title">Add Product</h2>
      <form class="inventory-form">
        <label for="name">Product Name:</label>
        <input type="text" id="name" name="name" required />

        <label for="animal">Animal Type:</label>
        <select id="animal" name="animal" required>
          <option value="">Select an animal type</option>
          <option value="dog">Dog</option>
          <option value="cat">Cat</option>
          <option value="bird">Bird</option>
          <option value="fish">Fish</option>
        </select>

        <label for="type">Product Type:</label>
        <select id="type" name="type" required>
          <option value="">Select a product type</option>
          <option value="dry food">DRY FOOD</option>
          <option value="wet food">WET FOOD</option>
          <option value="snack">SNACK</option>
        </select>

        <label for="price">Product Price:</label>
        <input type="number" id="price" name="price" min="0" required />

        <label for="stock">Stock:</label>
        <input type="number" id="stock" name="stock" min="0" required />

        <label for="image">Product Image:</label>
        <input
          type="file"
          id="image"
          name="image"
          accept=".jpg, .jpeg, .png,image/jpeg,image/png"
        />

        <label for="description">Product Description:</label>
        <textarea
          id="description"
          name="description"
          rows="4"
          required
        ></textarea>

        <div class="form-actions">
          <button
            type="button"
            id="cancelBtn"
            onclick="cancelEdit()"
            class="cancel-btn"
            style="display: none"
          >
            Cancel
          </button>
          <button type="button" id="saveBtn" onclick="save()" class="save-btn">
            Save Product
          </button>
        </div>
      </form>

      <h2>Product List</h2>
      <div class="table-scroll">
        <table class="product-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Animal</th>
              <th>Type</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="productList"></tbody>
        </table>
      </div>
    </main>

    <script src="/controller/js/header.js"></script>

    <script>
      let editId = null;
      let products = [];

      function shortText(text, max) {
        if (!text) return "";
        if (text.length > max) return text.slice(0, max) + "...";
        return text;
      }

      function loadInventory() {
        fetch("/inventory")
          .then(function (response) {
            if (!response.ok) {
              alert("Failed to load products.");
              return null;
            }
            return response.json();
          })
          .then(function (data) {
            if (!data) return;
            products = data;

            // สร้างแถวตารางทีละสินค้า
            let html = "";
            for (let i = 0; i < products.length; i++) {
              let p = products[i];
              html =
                html +
                "<tr>" +
                '<td><img src="/inventory/image/' +
                p.idproduct +
                '" alt="' +
                p.name +
                '" width="50"></td>' +
                "<td>" +
                p.name +
                "</td>" +
                "<td>" +
                p.animal +
                "</td>" +
                "<td>" +
                p.type +
                "</td>" +
                "<td>฿" +
                p.price +
                "</td>" +
                "<td>" +
                p.stock +
                "</td>" +
                "<td>" +
                '<div class="table-actions">' +
                '<button type="button" class="btn-edit" onclick="editProduct(' +
                p.idproduct +
                ')" title="Edit"><i class="fa-solid fa-pen-to-square"></i></button>' +
                '<button type="button" class="btn-delete" onclick="deleteProduct(' +
                p.idproduct +
                ')" title="Delete"><i class="fa-solid fa-trash"></i></button>' +
                "</div>" +
                "</td>" +
                "</tr>";
            }
            document.getElementById("productList").innerHTML = html;
          });
      }

      // บันทึกสินค้า (POST ใหม่ / PUT แก้ไข)
      function save() {
        let form = document.querySelector(".inventory-form");
        let data = new FormData(form); // เก็บข้อมูลจาก form + รูป

        if (!editId && !document.getElementById("image").files.length) {
          alert("Please choose an image.");
          return;
        }

        let url = "";
        let method = "";
        if (editId) {
          url = "/inventory/" + editId;
          method = "PUT";
        } else {
          url = "/inventory";
          method = "POST";
        }

        fetch(url, { method: method, body: data })
          .then(function (response) {
            if (response.ok) {
              alert("Saved successfully!");
              cancelEdit();
              loadInventory();
            } else {
              return response.text();
            }
          })
          .then(function (text) {
            if (text) {
              alert("Failed: " + text);
            }
          });
      }

      // ใส่ข้อมูลลง form เพื่อแก้ไข
      function editProduct(id) {
        let p = null;
        for (let i = 0; i < products.length; i++) {
          if (products[i].idproduct === id) {
            p = products[i];
            break;
          }
        }
        if (!p) return;
        document.getElementById("name").value = p.name;
        document.getElementById("animal").value = p.animal;
        document.getElementById("type").value = p.type;
        document.getElementById("price").value = p.price;
        document.getElementById("stock").value = p.stock;
        document.getElementById("description").value = p.description;
        editId = id;
        document.getElementById("Title").textContent = "Edit Product #" + id;
        document.getElementById("saveBtn").textContent = "Save edit";
        document.getElementById("cancelBtn").style.display = "inline-block";
        window.scrollTo(0, 0);
      }

      // ยกเลิกโหมดแก้ไข
      function cancelEdit() {
        editId = null;
        document.querySelector(".inventory-form").reset();
        document.getElementById("Title").textContent = "Add Product";
        document.getElementById("saveBtn").textContent = "Save Product";
        document.getElementById("cancelBtn").style.display = "none";
      }

      function deleteProduct(id) {
        if (!confirm("Delete this product?")) return;
        fetch("/inventory/" + id, { method: "DELETE" }).then(
          function (response) {
            if (response.ok) {
              loadInventory();
            } else {
              alert("Failed to delete");
            }
          },
        );
      }

      loadInventory();
    </script>
  </body>
</html>
